spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:2s}

bankflow:
  jwt:
    issuer: ${JWT_ISSUER:bankflow-api}
    secret: ${JWT_SECRET}
    access-token-minutes: ${JWT_ACCESS_TOKEN_MINUTES:15}
    refresh-token-days: ${JWT_REFRESH_TOKEN_DAYS:7}
    refresh-token-cleanup-cron: ${JWT_REFRESH_TOKEN_CLEANUP_CRON:0 15 3 * * *}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  rate-limit:
    backend: ${RATE_LIMIT_BACKEND:redis}
    capacity: ${RATE_LIMIT_CAPACITY:60}
    refill-per-minute: ${RATE_LIMIT_REFILL_PER_MINUTE:60}
    redis-key-prefix: ${RATE_LIMIT_REDIS_KEY_PREFIX:bankflow:rate-limit}
    redis-fail-open: ${RATE_LIMIT_REDIS_FAIL_OPEN:false}
  transfers:
    review-threshold: ${TRANSFER_REVIEW_THRESHOLD:10000.00}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: never
  health:
    redis:
      enabled: ${REDIS_HEALTH_ENABLED:true}

logging:
  level:
    org.springframework.security: WARN
