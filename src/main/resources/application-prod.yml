spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate

bankflow:
  jwt:
    issuer: ${JWT_ISSUER:bankflow-api}
    secret: ${JWT_SECRET}
    access-token-minutes: ${JWT_ACCESS_TOKEN_MINUTES:15}
    refresh-token-days: ${JWT_REFRESH_TOKEN_DAYS:7}
    refresh-token-cleanup-cron: ${JWT_REFRESH_TOKEN_CLEANUP_CRON:0 15 3 * * *}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  rate-limit:
    capacity: ${RATE_LIMIT_CAPACITY:60}
    refill-per-minute: ${RATE_LIMIT_REFILL_PER_MINUTE:60}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: never

logging:
  level:
    org.springframework.security: WARN
