services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bankflow
      POSTGRES_USER: bankflow
      POSTGRES_PASSWORD: bankflow
    ports:
      - "55432:5432"
    volumes:
      - bankflow-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bankflow -d bankflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/bankflow
      DATABASE_USERNAME: bankflow
      DATABASE_PASSWORD: bankflow
      JWT_SECRET: replace-this-local-dev-secret-with-a-long-random-value
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:8080
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health/readiness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  bankflow-postgres:
